[tox]
envlist = py38, py39, py310, py311, py312, py313, py314, lint, format, mypy, build-executable, check-extension
skip_missing_interpreters=true

[pkgenv]
config_settings_build_wheel = --build-option=--py-limited-api=cp38

[testenv]
package = wheel
wheel_build_env = build_wheel
deps =
    pytest
    pytest-clarity
    six # due to broken list of requirements of pytest-clarity
    pytest-xdist
    pytest-timeout
    pydantic
    lark
commands =
    pytest -p no:terminalprogress --timeout=15 {posargs:-n auto}

[testenv:tests]

[testenv:lint]
deps =
    ruff
    pylint
    mccabe
    pytest
    flake8
    flake8-bugbear
    pydantic
    lark
commands =
    ruff check gersemi tests
    pylint --recursive=y gersemi tests
    flake8 gersemi tests

[testenv:format]
deps =
    ruff
commands =
    ruff format --check --diff gersemi stubs tests

[testenv:mypy]
setenv =
    MYPYPATH = stubs
deps =
    mypy
    types-dataclasses
    types-PyYAML
    pydantic
commands =
    mypy gersemi tests

[coverage:paths]
source =
    gersemi
    {env_site_packages_dir}/gersemi

[testenv:coverage]
deps =
    pytest
    pytest-cov
    pytest-clarity
    lark
commands =
    pytest --cov --cov-branch --cov-report term-missing {posargs}

[testenv:profiling]
deps =
    pytest
    pytest-profiling
    pydantic
    lark
commands =
    pytest --profile-svg {posargs}

[testenv:build-executable]
allowlist_externals =
    ./dist/*
deps =
    pyinstaller
    colorama
commands =
    # Build executable
    pyinstaller \
        --onefile \
        --name "{posargs:gersemi}" \
        --hidden-import colorama \
        --copy-metadata gersemi \
        "gersemi/__main__.py"

    # and test it
    "./dist/{posargs:gersemi}" --version
    "./dist/{posargs:gersemi}" \
        --config "{tox_root}/.gersemirc.example" \
        --no-cache \
        --check \
        --diff --color \
        "{tox_root}/tests/executable/directory_with_formatted_files"

[testenv:check-extension]
allowlist_externals =
    cargo
changedir = gersemi/rust-backend
commands =
    cargo clippy
    cargo fmt --check
